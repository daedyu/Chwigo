spring:
  application:
    name: chwigo
  datasource:
    url: jdbc:mariadb://localhost:3306/chwigo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: chwigo
    password: chwigo1234
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

jwt:
  secret: chwigo-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

server:
  port: 8080

logging:
  level:
    org.flywaydb: INFO
